function getAnswersData(){
  var data={};
  var answered=0;
  for(var i=0;i<QUESTIONS.length;i++){
    if(answers[i]!==null){
      data['soru'+(i+1)+'_kategori']=QUESTIONS[i].cat;
      data['soru'+(i+1)+'_cevap']=QUESTIONS[i].opts[answers[i]];
      data['soru'+(i+1)+'_puan']=answers[i]+1;
      answered++;
    }
  }
  data.cevaplanan_soru=answered;
  return data;
}

    for(var i=0;i<answers.length;i++) if(answers[i]!==null) answeredCount++;
    if(answeredCount>0){
      var terkAdimi=step<=6?'soru_'+(step+1):step===7?'sonuc_ekrani':'iletisim_formu';
      var partial={event:'fide_test_terk',terk_adimi:terkAdimi};
      Object.assign(partial,getAnswersData());
      sendToWebhook(partial);
      try{
        window.dataLayer=window.dataLayer||[];
        window.dataLayer.push({event:'fide_test_terk',terk_adimi:terkAdimi,cevaplanan_soru:partial.cevaplanan_soru});
      }catch(ex){}
    }
  }
  overlay.classList.add('fw-hidden');
  try{ sessionStorage.setItem('fide_closed','1'); }catch(e){}
}

function updateProgress(){
  if(step<0||step>=7){ progWrap.style.display='none'; return; }
  progWrap.style.display='block';
  progFill.style.width=Math.round((step/7)*100)+'%';
  progLbl.textContent='Soru '+(step+1)+' / 7';
}

function render(){
  updateProgress();
  body.innerHTML='';
  var div=document.createElement('div');
  div.className='fw-slide';
  if(step===-1)       div.innerHTML=introHTML();
  else if(step<=6)    div.innerHTML=questionHTML(step);
  else if(step===7)   div.innerHTML=resultHTML();
  else if(step===8)   div.innerHTML=formHTML();
  else                div.innerHTML=thankYouHTML();
  body.appendChild(div);
  bindEvents();
  body.scrollTop=0;
}

function introHTML(){
  return '<div class="fw-intro-icon"><svg width="34" height="34" viewBox="0 0 34 34" fill="none"><path d="M6 27l3.5-10.5L25 6l3 3-15.5 15.5L6 27z" fill="#dbe6ff" stroke="#1b479d" stroke-width="1.8" stroke-linejoin="round"/><path d="M21.5 9.5l3 3" stroke="#1b479d" stroke-width="1.8" stroke-linecap="round"/></svg></div>'+
    '<div class="fw-intro-title">E\u011fitim anlay\u0131\u015f\u0131n\u0131z Fide ile<br>ne kadar \u00f6rt\u00fc\u015f\u00fcyor?</div>'+
    '<div class="fw-intro-desc">Fide\'nin e\u011fitim yakla\u015f\u0131m\u0131 ailenize ne kadar uygun? Hemen \u00f6\u011frenin.</div>'+
    '<div class="fw-intro-chips"><div class="fw-chip"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5" stroke="#64748b" stroke-width="1.5"/><path d="M8 5v3.5l2 2" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/></svg> 2 dakika</div><div class="fw-chip"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M3 8h10M3 5h10M3 11h6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/></svg> 7 soru</div></div>'+
    '<button type="button" class="fw-btn-primary" data-action="start">Teste Ba\u015fla &rarr;</button>';
}

function questionHTML(i){
  var q=QUESTIONS[i];
  var opts=q.opts.map(function(o,idx){
    var sel=answers[i]===idx?' fw-sel':'';
    return '<div class="fw-opt'+sel+'" data-action="pick" data-idx="'+idx+'"><div class="fw-radio"><div class="fw-radio-dot"></div></div><div class="fw-opt-text">'+esc(o)+'</div></div>';
  }).join('');
  var backBtn=i>0?'<button type="button" class="fw-btn-back" data-action="back">&#8592; Geri</button>':'<span></span>';
  var isLast=i===QUESTIONS.length-1;
  return '<div class="fw-cat">'+esc(q.cat)+'</div>'+
    '<div class="fw-qtext">'+esc(q.text)+'</div>'+
    '<div class="fw-options">'+opts+'</div>'+
    '<div class="fw-nav">'+backBtn+
    '<button type="button" class="fw-btn-next" data-action="next"'+(answers[i]===null?' disabled':'')+'>'+(isLast?'Sonucu G\u00f6r':'Devam')+'</button></div>';
}

function formHTML(){
  var opts=CLASSES.map(function(c){return '<option value="'+esc(c)+'"'+(form.grade===c?' selected':'')+'>'+esc(c)+'</option>';}).join('');
  return '<div class="fw-form-top"><div class="fw-form-icon">&#128203;</div><div class="fw-form-top-text"><h3>Sizinle ileti\u015fime ge\u00e7elim</h3><p>Bilgilerinizi b\u0131rak\u0131n, size<br>en k\u0131sa s\u00fcrede ula\u015fal\u0131m.</p></div></div>'+
    '<div class="fw-field"><label class="fw-label" for="fw-name">Veli Ad\u0131 Soyad\u0131</label><input class="fw-input" type="text" id="fw-name" placeholder="Ad\u0131n\u0131z Soyad\u0131n\u0131z" value="'+esc(form.name)+'"><div class="fw-err" id="fw-err-name">L\u00fctfen ad\u0131n\u0131z\u0131 ve soyad\u0131n\u0131z\u0131 girin.</div></div>'+
    '<div class="fw-field"><label class="fw-label" for="fw-phone">Telefon Numaras\u0131</label><input class="fw-input" type="tel" id="fw-phone" placeholder="05__ ___ __ __" value="'+esc(form.phone)+'"><div class="fw-err" id="fw-err-phone">L\u00fctfen telefon numaras\u0131n\u0131z\u0131 girin.</div></div>'+
    '<div class="fw-field"><label class="fw-label" for="fw-grade">\u00d6\u011frenci S\u0131n\u0131f Bilgisi</label><select class="fw-select" id="fw-grade"><option value="">S\u0131n\u0131f se\u00e7iniz</option>'+opts+'</select><div class="fw-err" id="fw-err-grade">L\u00fctfen bir s\u0131n\u0131f se\u00e7in.</div></div>'+
    '<div class="fw-kvkk"><input type="checkbox" id="fw-kvkk"><label for="fw-kvkk"><a href="https://www.fideokullari.k12.tr/kvkk/" target="_blank">Ayd\u0131nlatma Metnini</a> okudum ve ki\u015fisel verilerimin i\u015flenmesini kabul ediyorum.</label></div>'+
    '<div class="fw-err" id="fw-err-kvkk">L\u00fctfen ayd\u0131nlatma metnini onaylay\u0131n.</div>'+
    '<div class="fw-nav"><button type="button" class="fw-btn-back" data-action="back">&#8592; Geri</button><button type="button" class="fw-btn-next" data-action="submit">G\u00f6nder</button></div>';
}

function resultHTML(){
  var total=0; for(var i=0;i<answers.length;i++) total+=answers[i]+1;
  result.total=total;
  result.label=total>=28?'\u00c7ok Uygun':total>=21?'Uygun':'Uygun Olmayabilir';
  result.excludeRemarketing=total<21;
  var label,emoji,bg,desc,ctas;
  if(total>=28){
    label='&#199;ok Uygun';emoji='&#11088;';bg='background:linear-gradient(145deg,#fef9c3,#fde68a)';
    desc='G\u00f6r\u00fcn\u00fc\u015fe g\u00f6re Fide\'nin e\u011fitim yakla\u015f\u0131m\u0131 ailenizin beklentileriyle g\u00fc\u00e7l\u00fc bir uyum i\u00e7inde. \u015eimdi Fide\'yi daha yak\u0131ndan tan\u0131man\u0131n tam zaman\u0131.';
    ctas='<div class="fw-cta-list">'+
      '<button type="button" class="fw-cta-btn fw-cta-primary" data-action="cta" data-cta="bilgi">Fide ile ilgili detayl\u0131 bilgi almak istiyorum.</button>'+
      '<button type="button" class="fw-cta-btn" data-action="cta" data-cta="haber">Fide\'deki geli\u015fmelerden haberdar olmak istiyorum.</button>'+
      '<button type="button" class="fw-cta-btn" data-action="cta" data-cta="tesekkur">\u015eu an i\u00e7in te\u015fekk\u00fcr ederim. Belki bir ba\u015fka zaman.</button></div>';
  }
  else if(total>=21){
    label='Uygun';emoji='&#9989;';bg='background:linear-gradient(145deg,#d1fae5,#6ee7b7)';
    desc='G\u00f6r\u00fcn\u00fc\u015fe g\u00f6re Fide\'nin e\u011fitim yakla\u015f\u0131m\u0131 ailenizin beklentileriyle g\u00fc\u00e7l\u00fc bir uyum i\u00e7inde. \u015eimdi Fide\'yi daha yak\u0131ndan tan\u0131man\u0131n tam zaman\u0131.';
    ctas='<div class="fw-cta-list">'+
      '<button type="button" class="fw-cta-btn fw-cta-primary" data-action="cta" data-cta="bilgi">Fide ile ilgili detayl\u0131 bilgi almak istiyorum.</button>'+
      '<button type="button" class="fw-cta-btn" data-action="cta" data-cta="haber">Fide\'deki geli\u015fmelerden haberdar olmak istiyorum.</button>'+
      '<button type="button" class="fw-cta-btn" data-action="cta" data-cta="tesekkur">\u015eu an i\u00e7in te\u015fekk\u00fcr ederim. Belki bir ba\u015fka zaman.</button></div>';
  }
  else{
    label='Uygun Olmayabilir';emoji='&#128161;';bg='background:linear-gradient(145deg,#dbeafe,#93c5fd)';
    desc='G\u00f6rd\u00fc\u011f\u00fcm\u00fcz kadar\u0131yla bizim ve sizin tercihleriniz farkl\u0131 ama yine de okuldan beklentilerinizi ve \u00e7ocu\u011funuzun ihtiya\u00e7lar\u0131n\u0131 konu\u015fabilece\u011fimiz bir g\u00f6r\u00fc\u015fmede bulu\u015fmak isteriz.';
    ctas='<div class="fw-cta-list">'+
      '<button type="button" class="fw-cta-btn fw-cta-primary" data-action="cta" data-cta="gorusme">Ben de g\u00f6r\u00fc\u015fmek isterim.</button>'+
      '<button type="button" class="fw-cta-btn" data-action="cta" data-cta="tesekkur">\u015eu an i\u00e7in te\u015fekk\u00fcr ederim. Belki bir ba\u015fka zaman.</button></div>';
  }
  return '<div class="fw-result-wrap"><div class="fw-result-badge" style="'+bg+'">'+emoji+'</div>'+
    '<div class="fw-result-label">'+label+'</div>'+
    '<div class="fw-result-score">'+total+' / 35 puan</div>'+
    '<div class="fw-result-desc">'+desc+'</div>'+
    ctas+
    '<button type="button" class="fw-btn-restart" data-action="restart">Tekrar \u00c7\u00f6z</button></div>';
}

function thankYouHTML(){
  var msg,icon;
  if(lastCta==='gorusme'||lastCta==='bilgi'){
    icon='&#128222;';
    msg='Anketimizi yan\u0131tlad\u0131\u011f\u0131n\u0131z i\u00e7in te\u015fekk\u00fcr ederiz. Sizinle en k\u0131sa s\u00fcrede ileti\u015fime ge\u00e7ece\u011fiz.';
  } else {
    icon='&#128276;';
    msg='Anketimizi yan\u0131tlad\u0131\u011f\u0131n\u0131z i\u00e7in te\u015fekk\u00fcr ederiz. G\u00f6r\u00fc\u015fmek dile\u011fiyle.';
  }
  return '<div class="fw-result-wrap">'+
    '<div class="fw-ty-icon">'+icon+'</div>'+
    '<div class="fw-ty-title">Te\u015fekk\u00fcrler!</div>'+
    '<div class="fw-ty-desc">'+msg+'</div>'+
    '<button type="button" class="fw-btn-primary" data-action="close">Kapat</button></div>';
}

function bindEvents(){
  var els=body.querySelectorAll('[data-action]');
  for(var i=0;i<els.length;i++) els[i].addEventListener('click',handleAction);
}

function handleAction(e){
  e.preventDefault();
  var action=e.currentTarget.getAttribute('data-action');
  if(action==='start'){ step=0; render(); }
  else if(action==='pick'){
    var idx=parseInt(e.currentTarget.getAttribute('data-idx'),10);
    answers[step]=idx;
    var allOpts=body.querySelectorAll('.fw-opt');
    for(var j=0;j<allOpts.length;j++) allOpts[j].classList.remove('fw-sel');
    e.currentTarget.classList.add('fw-sel');
    var nextBtn=body.querySelector('.fw-btn-next');
    if(nextBtn) nextBtn.disabled=false;
  }
  else if(action==='next'){ if(answers[step]===null)return; step++; render(); }
  else if(action==='back'){ step--; render(); }
  else if(action==='submit'){ submitForm(); }
  else if(action==='cta'){
    var ctaType=e.currentTarget.getAttribute('data-cta');
    lastCta=ctaType;
    if(ctaType==='tesekkur'){
      step=9; render();
    } else {
      step=8; render();
    }
  }
  else if(action==='close'){ closeWidget(); }
  else if(action==='restart'){ step=-1; answers=[null,null,null,null,null,null,null]; form={name:'',phone:'',grade:''}; lastCta=''; result={total:0,label:'',excludeRemarketing:false}; render(); }
}

function sha256(str){
  var buf=new TextEncoder().encode(str.toLowerCase().trim());
  return crypto.subtle.digest('SHA-256',buf).then(function(h){
    return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  });
}

function submitForm(){
  var n=(document.getElementById('fw-name')||{value:''}).value.trim();
  var p=(document.getElementById('fw-phone')||{value:''}).value.trim();
  var g=(document.getElementById('fw-grade')||{value:''}).value;
  var kvkk=(document.getElementById('fw-kvkk')||{}).checked;
  toggleErr('fw-err-name',!n); toggleErr('fw-err-phone',!p); toggleErr('fw-err-grade',!g); toggleErr('fw-err-kvkk',!kvkk);
  if(!n||!p||!g||!kvkk) return;
  form={name:n,phone:p,grade:g};

  // Webhook: düz veri + soru cevapları + seçilen CTA
  var webhookData={event:'fide_test_tamamlandi',fide_skor:result.total,fide_sonuc:result.label,fide_cta_type:lastCta,fide_veli_adi:n,fide_telefon:p,fide_sinif:g,fide_remarketing_haric:result.excludeRemarketing};
  Object.assign(webhookData,getAnswersData());
  sendToWebhook(webhookData);

  // dataLayer: hashlenmiş kişisel veri
  Promise.all([sha256(n),sha256(p)]).then(function(hashes){
    window.dataLayer=window.dataLayer||[];
    window.dataLayer.push({event:'fide_test_tamamlandi',fide_skor:result.total,fide_sonuc:result.label,fide_cta_type:lastCta,fide_veli_adi_hash:hashes[0],fide_telefon_hash:hashes[1],fide_sinif:g,fide_remarketing_haric:result.excludeRemarketing});
  });

  step=9; render();
}

function toggleErr(id,show){
  var el=document.getElementById(id);
  if(!el) return;
  if(show) el.classList.add('fw-show'); else el.classList.remove('fw-show');
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init(){
  try{ if(sessionStorage.getItem('fide_closed')==='1') return; }catch(e){}
  openWidget();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
