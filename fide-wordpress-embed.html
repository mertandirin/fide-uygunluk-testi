<!-- Fide Okulları - Uygunluk Testi Widget -->
<!-- WordPress Custom HTML bloğuna yapıştırın -->
<meta charset="UTF-8">
<style>

/* ─── Reset sadece widget için ─────────────────────────────────── */
#fw-overlay *, #fw-overlay *::before, #fw-overlay *::after {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ─── Overlay ───────────────────────────────────────────────────── */
#fw-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 12, 30, 0.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 2147483647;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fw-fade-in 0.3s ease both;
}
#fw-overlay.fw-hidden { display: none; }

/* ─── Card ──────────────────────────────────────────────────────── */
#fw-card {
  background: #ffffff;
  border-radius: 24px;
  width: 100%;
  max-width: 488px;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 24px 48px -8px rgba(0,0,0,0.42),
    0 8px 16px -4px rgba(0,0,0,0.18);
  animation: fw-pop-in 0.45s cubic-bezier(0.34, 1.45, 0.64, 1) both;
  overflow: hidden;
}

/* ─── Header ────────────────────────────────────────────────────── */
#fw-header {
  background: linear-gradient(145deg, #0d2d6e 0%, #1b479d 55%, #2660c8 100%);
  padding: 28px 28px 26px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
#fw-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
}
#fw-header::after {
  content: '';
  position: absolute;
  bottom: -50px; left: 15%;
  width: 130px; height: 130px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
}

#fw-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 34px; height: 34px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.14);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 2;
}
#fw-close:hover { background: rgba(255,255,255,0.26); }
#fw-close svg { display: block; }

.fw-header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.14);
  border-radius: 8px;
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.88);
  letter-spacing: 0.3px;
  margin-bottom: 14px;
}
#fw-header h1 {
  font-size: 22px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.6px;
  line-height: 1.25;
  margin-bottom: 5px;
}
#fw-header p {
  font-size: 14px;
  color: rgba(255,255,255,0.68);
  font-weight: 400;
  line-height: 1.5;
}

/* ─── Progress ──────────────────────────────────────────────────── */
#fw-progress-wrap {
  padding: 20px 28px 0;
  flex-shrink: 0;
}
#fw-progress-track {
  height: 7px;
  background: #edf2f7;
  border-radius: 99px;
  overflow: hidden;
}
#fw-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #1b479d, #4a7de8);
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
#fw-progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
  animation: fw-shimmer 2.2s ease-in-out infinite;
}
#fw-progress-label {
  font-size: 12px;
  font-weight: 700;
  color: #94a3b8;
  text-align: right;
  margin-top: 8px;
  letter-spacing: 0.3px;
}

/* ─── Body scroll area ──────────────────────────────────────────── */
#fw-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 28px;
  scrollbar-width: thin;
  scrollbar-color: #d1d5db transparent;
}
#fw-body::-webkit-scrollbar { width: 4px; }
#fw-body::-webkit-scrollbar-track { background: transparent; }
#fw-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }

/* ─── Intro ─────────────────────────────────────────────────────── */
.fw-intro-icon {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(145deg, #e8f0ff, #dbe6ff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 22px;
  box-shadow: 0 6px 20px rgba(27,71,157,0.12);
}
.fw-intro-title {
  font-size: 21px;
  font-weight: 800;
  color: #0f172a;
  text-align: center;
  letter-spacing: -0.5px;
  line-height: 1.3;
  margin-bottom: 12px;
}
.fw-intro-desc {
  font-size: 15px;
  color: #64748b;
  text-align: center;
  line-height: 1.75;
  margin-bottom: 26px;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}
.fw-intro-chips {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
.fw-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 99px;
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  font-size: 13px;
  font-weight: 600;
  color: #475569;
}

/* ─── Question ──────────────────────────────────────────────────── */
.fw-cat {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: #1b479d;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: #eef4ff;
  padding: 5px 12px;
  border-radius: 7px;
  margin-bottom: 14px;
}
.fw-qtext {
  font-size: 18px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.5;
  letter-spacing: -0.3px;
  margin-bottom: 20px;
}

/* ─── Option cards ──────────────────────────────────────────────── */
.fw-options { display: flex; flex-direction: column; gap: 10px; }

.fw-opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: 14px;
  border: 2px solid #e2e8f0;
  background: #ffffff;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s, transform 0.18s;
  user-select: none;
  -webkit-user-select: none;
}
.fw-opt:hover {
  border-color: #a5bcf8;
  background: #f7f9ff;
  box-shadow: 0 3px 12px rgba(27,71,157,0.08);
  transform: translateY(-1px);
}
.fw-opt.fw-sel {
  border-color: #1b479d;
  background: linear-gradient(135deg, #eef4ff 0%, #dce8ff 100%);
  box-shadow: 0 4px 16px rgba(27,71,157,0.16);
  transform: translateY(-1px);
}

.fw-radio {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid #c8d3e0;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}
.fw-opt:hover .fw-radio { border-color: #7aa5f0; }
.fw-opt.fw-sel .fw-radio {
  border-color: #1b479d;
  background: #1b479d;
  box-shadow: 0 0 0 3px rgba(27,71,157,0.18);
}
.fw-radio-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transform: scale(0);
  transition: opacity 0.15s, transform 0.15s;
}
.fw-opt.fw-sel .fw-radio-dot { opacity: 1; transform: scale(1); }

.fw-opt-text {
  font-size: 14.5px;
  color: #334155;
  line-height: 1.55;
  font-weight: 400;
  transition: color 0.15s, font-weight 0.15s;
}
.fw-opt.fw-sel .fw-opt-text { color: #0f172a; font-weight: 600; }

/* ─── Navigation ────────────────────────────────────────────────── */
.fw-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 26px;
  gap: 10px;
}
.fw-btn-back {
  padding: 13px 22px;
  border-radius: 12px;
  border: none;
  background: #f1f5f9;
  color: #64748b;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.18s;
}
.fw-btn-back:hover { background: #e2e8f0; }

.fw-btn-next {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(145deg, #1b479d, #2558bb);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 18px -3px rgba(27,71,157,0.38);
  transition: all 0.2s;
  margin-left: auto;
}
.fw-btn-next:hover {
  background: linear-gradient(145deg, #163d87, #1e4a9e);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px -3px rgba(27,71,157,0.48);
}
.fw-btn-next:disabled {
  background: #e2e8f0;
  color: #94a3b8;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.fw-btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(145deg, #1b479d, #2558bb);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px -4px rgba(27,71,157,0.4);
  transition: all 0.22s;
  letter-spacing: -0.2px;
}
.fw-btn-primary:hover {
  background: linear-gradient(145deg, #163d87, #1e4a9e);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -4px rgba(27,71,157,0.5);
}

/* ─── Form ──────────────────────────────────────────────────────── */
.fw-form-top {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}
.fw-form-icon {
  width: 52px; height: 52px;
  border-radius: 15px;
  background: linear-gradient(145deg, #eef4ff, #dbe6ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(27,71,157,0.1);
  font-size: 24px;
}
.fw-form-top-text h3 {
  font-size: 18px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.fw-form-top-text p { font-size: 13.5px; color: #94a3b8; line-height: 1.55; }

.fw-field { margin-bottom: 16px; }
.fw-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #374151;
  margin-bottom: 8px;
  letter-spacing: 0.1px;
}
.fw-input, .fw-select {
  display: block;
  width: 100%;
  padding: 13px 16px;
  border-radius: 12px;
  border: 2px solid #e5e7eb;
  background: #f9fafb;
  font-size: 15px;
  color: #0f172a;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  font-family: inherit;
}
.fw-input:focus, .fw-select:focus {
  border-color: #1b479d;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(27,71,157,0.1);
}
.fw-select {
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 16px center;
  padding-right: 40px;
}
.fw-err {
  display: none;
  font-size: 12px;
  color: #ef4444;
  font-weight: 600;
  margin-top: 6px;
  padding-left: 3px;
}
.fw-err.fw-show { display: block; }

/* ─── Result ────────────────────────────────────────────────────── */
.fw-result-wrap { text-align: center; padding: 8px 0 4px; }
.fw-result-badge {
  width: 108px; height: 108px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  margin-bottom: 22px;
  animation: fw-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.fw-result-label {
  font-size: 28px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.7px;
  line-height: 1.2;
  margin-bottom: 10px;
}
.fw-result-score {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  color: #1b479d;
  background: #eef4ff;
  padding: 6px 18px;
  border-radius: 99px;
  margin-bottom: 18px;
}
.fw-result-desc {
  font-size: 15px;
  color: #64748b;
  line-height: 1.8;
  max-width: 360px;
  margin: 0 auto 28px;
}
.fw-btn-restart {
  padding: 13px 36px;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  background: #f8fafc;
  color: #1b479d;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.fw-btn-restart:hover {
  background: #eef4ff;
  border-color: #a5bcf8;
  transform: translateY(-1px);
}

.fw-cta-box {
  background: linear-gradient(145deg, #eef4ff, #dde8ff);
  border: 1.5px solid #c5d5f5;
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.fw-cta-icon {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #1b479d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.fw-cta-text {
  font-size: 14.5px;
  font-weight: 600;
  color: #1b479d;
  line-height: 1.5;
  text-align: left;
}

/* ─── Animations ────────────────────────────────────────────────── */
@keyframes fw-fade-in   { from { opacity: 0 } to { opacity: 1 } }
@keyframes fw-pop-in    { from { opacity: 0; transform: translateY(40px) scale(0.93) } to { opacity: 1; transform: none } }
@keyframes fw-bounce    { 0% { transform: scale(0); opacity: 0 } 60% { transform: scale(1.2) } 85% { transform: scale(0.93) } 100% { transform: scale(1); opacity: 1 } }
@keyframes fw-shimmer   { 0% { transform: translateX(-200%) } 100% { transform: translateX(400%) } }
@keyframes fw-slide-in  { from { opacity: 0; transform: translateX(28px) } to { opacity: 1; transform: none } }

.fw-slide { animation: fw-slide-in 0.3s cubic-bezier(0.4, 0, 0.2, 1) both; }

</style>

<!-- ─── Widget HTML ─────────────────────────────────────────── -->
<div id="fw-overlay" class="fw-hidden">
  <div id="fw-card">

    <div id="fw-header">
      <button type="button" id="fw-close" aria-label="Kapat">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 1l11 11M12 1L1 12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="fw-header-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="6" cy="6" r="1.8" fill="currentColor"/>
        </svg>
        Fide Okulları
      </div>
      <h1>Fide Size Ne Kadar Uygun?</h1>
      <p>7 kısa soruyla eğitim anlayışınızı keşfedin</p>
    </div>

    <div id="fw-progress-wrap" style="display:none">
      <div id="fw-progress-track">
        <div id="fw-progress-fill" style="width:0%"></div>
      </div>
      <div id="fw-progress-label">Soru 1 / 7</div>
    </div>

    <div id="fw-body"></div>

  </div>
</div>

<script>
(function () {

  var QUESTIONS = [
    { cat: "Karar Verme Yaklaşımı", text: "Çocuğum ile ilgili kararları verirken...", opts: ["O anda hızlı çözüm sağlayan seçenekleri tercih ederim.", "Hızlı çözüm sağlayan seçeneklere öncelik veririm.", "Koşullara göre değerlendirme yaparım.", "Daha çok çocuğumun uzun vadeli faydasını düşünürüm.", "Çocuğumun uzun vadeli faydasını her zaman önceliğim olarak görürüm."] },
    { cat: "Okulda Sorumluluk", text: "Okuldaki sorumluluğum...", opts: ["Yalnızca kendi çocuğumla sınırlıdır.", "Daha çok kendi çocuğumla ilgili konulara odaklanmaktır.", "Duruma göre değişir.", "Okul ortamının gelişimine katkı sağlamayı da içerir.", "Hem çocuğumun hem de okul kültürünün gelişimine katkı sağlamayı içerir."] },
    { cat: "Okul Kuralları", text: "Okul kurallarını...", opts: ["Düşünmeden uygularım.", "Çoğunlukla sorgulamadan uygularım.", "Uygularken duruma göre değerlendirme yaparım.", "Uygularken arkasındaki amacı anlamaya çalışırım.", "Bana uymasa bile amacını anlamaya çalışır ve desteklerim."] },
    { cat: "İşbirliği", text: "Okuldan gelen geri bildirimler konusunda...", opts: ["Geri bildirimleri her zaman uygulamam.", "Bazı geri bildirimleri uygulamakta zorlanabilirim.", "Geri bildirimleri duruma göre değerlendiririm.", "Geri bildirimleri dinler ve çoğunlukla dikkate alırım.", "Geri bildirimleri dikkatle dinler ve her zaman değerlendirmeye çalışırım."] },
    { cat: "İletişim", text: "Okul ile iletişim konusunda...", opts: ["İhtiyaç duyulduğunda iletişim kurmak yeterlidir.", "Genellikle ihtiyaç anında iletişim kurarım.", "Duruma göre iletişim kurarım.", "Düzenli iletişim kurmayı önemsiyorum.", "Sürekli ve düzenli iletişim kurmayı çok önemli bulurum."] },
    { cat: "Başarı Anlayışı", text: "Benim için çocuğum...", opts: ["Özel okulda her çocuk gibi başarılı olmalıdır.", "Daha çok diğer çocuklarla benzer bir başarı düzeyi göstermelidir.", "Hem standart başarıyı yakalamalı hem de bireysel olarak gelişmelidir.", "Kendi gelişimi ve potansiyeli doğrultusunda ilerlemelidir.", "Kendi bireysel gelişimi ve potansiyeline göre değerlendirilmelidir."] },
    { cat: "Okulu Konumlandırma", text: "Benim için okul...", opts: ["Sadece hizmet aldığım bir yer.", "Daha çok hizmet odaklı bir yer.", "Hizmet aldığım bir yer ama ayrıca bir öğrenme topluluğu olduğunu da düşünüyorum.", "Bir öğrenme topluluğu.", "Velilerin de paydaşı olduğu bir öğrenme topluluğu."] }
  ];

  var CLASSES = ['4 Yaş','5 Yaş','1. Sınıf','2. Sınıf','3. Sınıf','4. Sınıf','5. Sınıf','6. Sınıf','7. Sınıf','8. Sınıf'];

  /* state */
  var step = -1; /* -1=intro, 0-6=question, 7=form, 8=result */
  var answers = new Array(7).fill(null);
  var form = { name: '', phone: '', grade: '' };

  /* DOM refs */
  var overlay  = document.getElementById('fw-overlay');
  var body     = document.getElementById('fw-body');
  var progWrap = document.getElementById('fw-progress-wrap');
  var progFill = document.getElementById('fw-progress-fill');
  var progLbl  = document.getElementById('fw-progress-label');
  var closeBtn = document.getElementById('fw-close');

  /* Tek delegated handler: WordPress'in tüm click müdahalesini engeller */
  overlay.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    /* overlay arka planına tıklama → kapat */
    if (e.target === overlay) { closeWidget(); return; }

    /* close butonu */
    if (closeBtn.contains(e.target)) { closeWidget(); return; }

    /* data-action elementini bul (tıklanan veya parent'ı) */
    var el = e.target;
    while (el && el !== overlay) {
      if (el.dataset && el.dataset.action) {
        dispatchAction(el);
        return;
      }
      el = el.parentElement;
    }
  });

  /* ── open / close ─────────────────────────────────────────── */
  function openWidget() {
    step = -1;
    answers.fill(null);
    form = { name: '', phone: '', grade: '' };
    render();
    overlay.classList.remove('fw-hidden');
  }

  function closeWidget() {
    overlay.classList.add('fw-hidden');
    try { sessionStorage.setItem('fide_closed', '1'); } catch(e) {}
    try { window.parent.postMessage('fide_closed', '*'); } catch(e) {}
  }

  /* ── progress bar ─────────────────────────────────────────── */
  function updateProgress() {
    if (step < 0 || step >= 7) {
      progWrap.style.display = 'none';
      return;
    }
    progWrap.style.display = 'block';
    var pct = Math.round((step / 7) * 100);
    progFill.style.width = pct + '%';
    progLbl.textContent = 'Soru ' + (step + 1) + ' / 7';
  }

  /* ── render ───────────────────────────────────────────────── */
  function render() {
    updateProgress();
    body.innerHTML = '';
    var div = document.createElement('div');
    div.className = 'fw-slide';

    if (step === -1) { div.innerHTML = introHTML(); }
    else if (step >= 0 && step <= 6) { div.innerHTML = questionHTML(step); }
    else if (step === 7) { div.innerHTML = formHTML(); }
    else { div.innerHTML = resultHTML(); }

    body.appendChild(div);
    body.scrollTop = 0;
  }

  /* ── intro ────────────────────────────────────────────────── */
  function introHTML() {
    return '\
      <div class="fw-intro-icon">\
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">\
          <path d="M6 27l3.5-10.5L25 6l3 3-15.5 15.5L6 27z" fill="#dbe6ff" stroke="#1b479d" stroke-width="1.8" stroke-linejoin="round"/>\
          <path d="M21.5 9.5l3 3" stroke="#1b479d" stroke-width="1.8" stroke-linecap="round"/>\
          <circle cx="26" cy="8" r="3" fill="#1b479d" fill-opacity="0.15" stroke="#1b479d" stroke-width="1.5"/>\
        </svg>\
      </div>\
      <div class="fw-intro-title">Eğitim anlayışınız Fide ile<br>ne kadar örtüşüyor?</div>\
      <div class="fw-intro-desc">Bu kısa test, Fide Okulları\'nın sizin eğitim anlayışınıza ve beklentilerinize ne kadar uygun olduğunu anlamanıza yardımcı olacaktır.</div>\
      <div class="fw-intro-chips">\
        <div class="fw-chip"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5" stroke="#64748b" stroke-width="1.5"/><path d="M8 5v3.5l2 2" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/></svg> 2 dakika</div>\
        <div class="fw-chip"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M3 8h10M3 5h10M3 11h6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/></svg> 7 soru</div>\
      </div>\
      <button type="button" class="fw-btn-primary" data-action="start">Teste Başla &rarr;</button>\
    ';
  }

  /* ── question ─────────────────────────────────────────────── */
  function questionHTML(i) {
    var q = QUESTIONS[i];
    var opts = q.opts.map(function (o, idx) {
      var sel = answers[i] === idx ? ' fw-sel' : '';
      return '<div class="fw-opt' + sel + '" data-action="pick" data-idx="' + idx + '">' +
        '<div class="fw-radio"><div class="fw-radio-dot"></div></div>' +
        '<div class="fw-opt-text">' + esc(o) + '</div>' +
        '</div>';
    }).join('');
    var isLast = (i === QUESTIONS.length - 1);
    var backBtn = i > 0
      ? '<button type="button" class="fw-btn-back" data-action="back">&#8592; Geri</button>'
      : '<span></span>';
    return '<div class="fw-cat">' + esc(q.cat) + '</div>' +
      '<div class="fw-qtext">' + esc(q.text) + '</div>' +
      '<div class="fw-options">' + opts + '</div>' +
      '<div class="fw-nav">' + backBtn +
      '<button type="button" class="fw-btn-next" data-action="next"' + (answers[i] === null ? ' disabled' : '') + '>' +
      (isLast ? 'Formu Doldur' : 'Devam') + '</button></div>';
  }

  /* ── form ─────────────────────────────────────────────────── */
  function formHTML() {
    var gradeOptions = CLASSES.map(function (c) {
      return '<option value="' + esc(c) + '"' + (form.grade === c ? ' selected' : '') + '>' + esc(c) + '</option>';
    }).join('');
    return '<div class="fw-form-top">' +
      '<div class="fw-form-icon">📋</div>' +
      '<div class="fw-form-top-text"><h3>Neredeyse bitti!</h3><p>Sonucunuzu görmek için lütfen<br>bilgilerinizi bırakın.</p></div>' +
      '</div>' +
      '<div class="fw-field">' +
        '<label class="fw-label" for="fw-name">Veli Adı Soyadı</label>' +
        '<input class="fw-input" type="text" id="fw-name" placeholder="Adınız Soyadınız" value="' + esc(form.name) + '">' +
        '<div class="fw-err" id="fw-err-name">Lütfen adınızı ve soyadınızı girin.</div>' +
      '</div>' +
      '<div class="fw-field">' +
        '<label class="fw-label" for="fw-phone">Telefon Numarası</label>' +
        '<input class="fw-input" type="tel" id="fw-phone" placeholder="05__ ___ __ __" value="' + esc(form.phone) + '">' +
        '<div class="fw-err" id="fw-err-phone">Lütfen telefon numaranızı girin.</div>' +
      '</div>' +
      '<div class="fw-field">' +
        '<label class="fw-label" for="fw-grade">Öğrenci Sınıf Bilgisi</label>' +
        '<select class="fw-select" id="fw-grade"><option value="">Sınıf seçiniz</option>' + gradeOptions + '</select>' +
        '<div class="fw-err" id="fw-err-grade">Lütfen bir sınıf seçin.</div>' +
      '</div>' +
      '<div class="fw-nav">' +
        '<button type="button" class="fw-btn-back" data-action="back">&#8592; Geri</button>' +
        '<button type="button" class="fw-btn-next" data-action="submit">Sonucumu Gör</button>' +
      '</div>';
  }

  /* ── result ───────────────────────────────────────────────── */
  function resultHTML() {
    var total = answers.reduce(function (s, a) { return s + (a + 1); }, 0);
    var label, emoji, bg, desc, positive;
    if (total >= 28) {
      label = 'Çok Uygun'; emoji = '⭐'; positive = true;
      bg = 'background:linear-gradient(145deg,#fef9c3,#fde68a)';
      desc = 'Eğitim anlayışınız ve beklentileriniz Fide Okulları\'nın yaklaşımıyla büyük ölçüde örtüşüyor. Fide\'de çocuğunuz ve aileniz için verimli bir eğitim süreci sizi bekliyor olabilir.';
    } else if (total >= 21) {
      label = 'Uygun'; emoji = '✅'; positive = true;
      bg = 'background:linear-gradient(145deg,#d1fae5,#6ee7b7)';
      desc = 'Eğitim anlayışınız Fide Okulları\'nın yaklaşımıyla uyumlu görünüyor. Birlikte güzel bir eğitim yolculuğu paylaşabiliriz.';
    } else {
      label = 'Uygun Olmayabilir'; emoji = '💡'; positive = false;
      bg = 'background:linear-gradient(145deg,#dbeafe,#93c5fd)';
      desc = 'Bazı alanlarda farklı beklentileriniz olabilir. Sizinle daha detaylı görüşmek için en kısa sürede iletişime geçeceğiz.';
    }

    var ctaHTML = '';
    if (positive) {
      ctaHTML = '<div class="fw-cta-box">' +
        '<div class="fw-cta-icon">📞</div>' +
        '<div class="fw-cta-text">Bilgileriniz bize ulaştı.<br>En kısa sürede sizinle iletişime geçeceğiz.</div>' +
        '</div>';
    } else {
      ctaHTML = '<div class="fw-cta-box">' +
        '<div class="fw-cta-icon">📞</div>' +
        '<div class="fw-cta-text">Sizi daha detaylı görüşmek için<br>en kısa sürede arayacağız.</div>' +
        '</div>';
    }

    return '<div class="fw-result-wrap">' +
      '<div class="fw-result-badge" style="' + bg + '">' + emoji + '</div>' +
      '<div class="fw-result-label">' + esc(label) + '</div>' +
      '<div class="fw-result-score">' + total + ' / 35 puan</div>' +
      '<div class="fw-result-desc">' + esc(desc) + '</div>' +
      ctaHTML +
      '<button type="button" class="fw-btn-restart" data-action="restart">Tekrar Çöz</button>' +
      '</div>';
  }

  /* ── action dispatch (delegated — çağıran overlay handler) ── */
  function dispatchAction(el) {
    var action = el.dataset.action;
    if (action === 'start') { step = 0; render(); }
    else if (action === 'pick') {
      var idx = parseInt(el.dataset.idx, 10);
      answers[step] = idx;
      /* DOM'u yeniden oluşturmadan sadece görsel güncelle */
      var opts = body.querySelectorAll('.fw-opt');
      opts.forEach(function(o, i) {
        if (i === idx) { o.classList.add('fw-sel'); }
        else { o.classList.remove('fw-sel'); }
      });
      /* Devam butonunu aktifleştir */
      var nextBtn = body.querySelector('[data-action="next"]');
      if (nextBtn) { nextBtn.disabled = false; }
    }
    else if (action === 'next') {
      if (answers[step] === null) return;
      step++;
      render();
    }
    else if (action === 'back') { step--; render(); }
    else if (action === 'submit') { submitForm(); }
    else if (action === 'restart') {
      step = -1; answers.fill(null); form = { name:'', phone:'', grade:'' };
      render();
    }
  }

  function submitForm() {
    var name  = (document.getElementById('fw-name')  || {}).value || '';
    var phone = (document.getElementById('fw-phone') || {}).value || '';
    var grade = (document.getElementById('fw-grade') || {}).value || '';
    name = name.trim(); phone = phone.trim();

    var ok = true;
    toggle('fw-err-name',  !name);  if (!name)  ok = false;
    toggle('fw-err-phone', !phone); if (!phone) ok = false;
    toggle('fw-err-grade', !grade); if (!grade) ok = false;
    if (!ok) return;

    form = { name: name, phone: phone, grade: grade };

    var total = answers.reduce(function (s, a) { return s + (a + 1); }, 0);
    var label = total >= 28 ? 'Çok Uygun' : total >= 21 ? 'Uygun' : 'Uygun Olmayabilir';
    try {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: 'fide_test_tamamlandi',
        fide_skor: total,
        fide_sonuc: label,
        fide_veli_adi: name,
        fide_telefon: phone,
        fide_sinif: grade
      });
    } catch(e) {}

    step = 8;
    render();
  }

  function toggle(id, show) {
    var el = document.getElementById(id);
    if (!el) return;
    if (show) el.classList.add('fw-show');
    else el.classList.remove('fw-show');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ── auto-open ────────────────────────────────────────────── */
  function init() {
    try { if (sessionStorage.getItem('fide_closed') === '1') return; } catch(e) {}
    openWidget();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
