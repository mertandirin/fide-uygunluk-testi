<script>
(function () {
  try { if (sessionStorage.getItem('fide_closed') === '1') return; } catch(e) {}

  var f = document.createElement('iframe');
  f.src = 'https://SITENIZ.COM/fide-test.html'; /* ← kendi URL'inizle değiştirin */
  f.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:2147483647;background:transparent;';
  f.setAttribute('allowtransparency', 'true');
  f.setAttribute('scrolling', 'no');
  document.body.appendChild(f);

  window.addEventListener('message', function (e) {
    if (e.data === 'fide_closed') {
      f.parentNode && f.parentNode.removeChild(f);
      try { sessionStorage.setItem('fide_closed', '1'); } catch(e) {}
    }
  });
})();
</script>
